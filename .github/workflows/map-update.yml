name: Weekly Map Update

on:
  schedule:
    # Runs at 00:00 every Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          #pip install -r requirements.txt
          pip install pillow

      - name: Run script
        run: dyna-downloader.py 

      - name: Commit and push image
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add map-dyna.jpg
          git commit -m "Automated update of map-dyna.jpg" || echo "No changes to commit"
          git push
